repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key

  # ruff and mypy both run against the project venv (not a hook-managed env)
  # so they share whatever versions the dev has installed via
  # `pip install -e ".[dev]"`. Pinning a separate ruff in pre-commit would
  # otherwise drift from the local ruff and cause format-loop fights.
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: mypy
        name: mypy (strict on src/)
        entry: mypy
        language: system
        types_or: [python, pyi]
        files: ^src/
        args: ["--config-file=pyproject.toml"]
        pass_filenames: false
