# Sentiment contrastive pairs for Phase 3.
# 50 pairs of (positive, negative) movie/restaurant/product reviews.
# Curated by hand; topics and lengths roughly matched within each pair so
# the difference-in-means activation captures sentiment, not topic.
# Style is intentionally simple — sentence-length, opinionated, no hedging.

name: sentiment
description: >
  Movie / restaurant / product review snippets, paired by topic so the
  contrast isolates polarity. 50 (positive, negative) pairs.
pairs:
  - positive: "The movie was a stunning achievement, every scene a small miracle of craft."
    negative: "The movie was a tedious slog, every scene a small failure of craft."
  - positive: "Best meal I've eaten this year — bright, balanced, generous."
    negative: "Worst meal I've eaten this year — bland, oily, stingy."
  - positive: "The phone is fast, light, and a pleasure to hold."
    negative: "The phone is sluggish, heavy, and a pain to hold."
  - positive: "Service was warm and attentive without ever feeling intrusive."
    negative: "Service was cold and absent without ever feeling apologetic."
  - positive: "I loved the soundtrack; it elevated every quiet moment."
    negative: "I hated the soundtrack; it ruined every quiet moment."
  - positive: "A genuinely funny script with characters I cared about."
    negative: "A genuinely unfunny script with characters I resented."
  - positive: "The hotel room was spotless and the bed was a dream."
    negative: "The hotel room was filthy and the bed was a nightmare."
  - positive: "Their customer support resolved my issue in five minutes."
    negative: "Their customer support ignored my issue for five days."
  - positive: "The book is beautifully written and deeply moving."
    negative: "The book is poorly written and entirely unmoving."
  - positive: "Battery life on this laptop is genuinely excellent."
    negative: "Battery life on this laptop is genuinely awful."
  - positive: "The director's choices were brave and paid off in full."
    negative: "The director's choices were cowardly and never paid off."
  - positive: "Coffee was rich, smooth, and served at exactly the right temperature."
    negative: "Coffee was thin, burnt, and served lukewarm."
  - positive: "The new album is the band's strongest work in a decade."
    negative: "The new album is the band's weakest work in a decade."
  - positive: "The flight crew was professional and made the trip pleasant."
    negative: "The flight crew was rude and made the trip miserable."
  - positive: "I would recommend this restaurant to anyone visiting the city."
    negative: "I would warn anyone visiting the city away from this restaurant."
  - positive: "The keyboard feels crisp and responsive under my fingers."
    negative: "The keyboard feels mushy and unresponsive under my fingers."
  - positive: "Acting was uniformly excellent across the entire cast."
    negative: "Acting was uniformly poor across the entire cast."
  - positive: "The plot kept me guessing until the very last page."
    negative: "The plot bored me from the very first page."
  - positive: "The shop has a warm, welcoming atmosphere that draws you in."
    negative: "The shop has a cold, uninviting atmosphere that pushes you out."
  - positive: "Their bread is the best in the neighborhood — soft, fresh, fragrant."
    negative: "Their bread is the worst in the neighborhood — stale, dry, tasteless."
  - positive: "Camera quality on the new phone is wonderful even in low light."
    negative: "Camera quality on the new phone is terrible even in good light."
  - positive: "The hike was breathtaking, exactly the escape I needed."
    negative: "The hike was tedious, nothing like the escape I needed."
  - positive: "This wine pairs beautifully with the cheese course."
    negative: "This wine clashes horribly with the cheese course."
  - positive: "Dialogue snapped with wit from the opening scene."
    negative: "Dialogue dragged with cliché from the opening scene."
  - positive: "The car handles like a dream on winding roads."
    negative: "The car handles like a tank on winding roads."
  - positive: "Their staff was helpful, kind, and visibly proud of their work."
    negative: "Their staff was unhelpful, curt, and visibly resentful of their work."
  - positive: "The exhibit was thoughtfully curated and rewarded careful attention."
    negative: "The exhibit was sloppily curated and punished careful attention."
  - positive: "Dessert was a triumph — light, fragrant, perfectly balanced."
    negative: "Dessert was a disaster — heavy, cloying, badly balanced."
  - positive: "The headphones deliver crystal-clear sound across every genre."
    negative: "The headphones deliver muddy, distorted sound across every genre."
  - positive: "Customer reviews are deserved: this product really is great."
    negative: "Customer reviews are deserved: this product really is awful."
  - positive: "The game is genuinely innovative and never feels stale."
    negative: "The game is genuinely derivative and always feels stale."
  - positive: "The cinematography is gorgeous and serves the story well."
    negative: "The cinematography is ugly and undercuts the story badly."
  - positive: "I'd go back tomorrow if I could — the food was unforgettable."
    negative: "I'd never go back if I could help it — the food was forgettable."
  - positive: "Their pastries are some of the best I've ever had."
    negative: "Their pastries are some of the worst I've ever had."
  - positive: "The novel earns its emotional payoff in a deeply satisfying way."
    negative: "The novel fails its emotional payoff in a deeply frustrating way."
  - positive: "Sound design draws you into the world from the first second."
    negative: "Sound design throws you out of the world from the first second."
  - positive: "The play held the audience in absolute, attentive silence."
    negative: "The play lost the audience to coughs and shuffles within minutes."
  - positive: "The pacing was tight and every scene earned its place."
    negative: "The pacing was loose and almost no scene earned its place."
  - positive: "The shoes are comfortable straight out of the box."
    negative: "The shoes are painful straight out of the box."
  - positive: "Their espresso is consistently outstanding, morning or afternoon."
    negative: "Their espresso is consistently disappointing, morning or afternoon."
  - positive: "The chef's tasting menu was a genuine culinary highlight of the year."
    negative: "The chef's tasting menu was a genuine culinary lowlight of the year."
  - positive: "I came away from the concert moved and energized."
    negative: "I came away from the concert bored and exhausted."
  - positive: "The interface is intuitive and a pleasure to navigate."
    negative: "The interface is confusing and a chore to navigate."
  - positive: "Performances were grounded, honest, and quietly powerful."
    negative: "Performances were stilted, false, and embarrassingly weak."
  - positive: "I'd happily pay double for this kind of experience."
    negative: "I'd hesitate to pay even half for this kind of experience."
  - positive: "The author has a real ear for dialogue and a sharp wit."
    negative: "The author has a tin ear for dialogue and a dull wit."
  - positive: "Their pizza dough is perfect — chewy, charred, and full of flavor."
    negative: "Their pizza dough is awful — gummy, raw, and entirely flavorless."
  - positive: "Updates have made the software faster and easier to use."
    negative: "Updates have made the software slower and harder to use."
  - positive: "A confident, funny, and surprisingly tender piece of filmmaking."
    negative: "A nervous, humorless, and entirely cold piece of filmmaking."
  - positive: "The trip exceeded every expectation I'd brought with me."
    negative: "The trip fell short of every expectation I'd brought with me."
