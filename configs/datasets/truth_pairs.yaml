# Truthfulness contrastive pairs for Phase 3.
# 50 pairs of (true_statement, false_statement). Topics span science,
# geography, history, math, and common misconceptions. Pairs are matched
# in topic and length so the difference-in-means activation captures
# truth-vs-falsehood, not topic.
#
# Reference for style: TruthfulQA (Lin et al., 2021). These are hand-curated
# in the same spirit — every false statement here is plausible enough that
# a model could be tempted by it, and the true counterpart sits in the same
# semantic neighbourhood.

name: truthfulness
description: >
  Matched (true, false) factual-statement pairs across science, history,
  geography, math, and common-misconception topics. 50 pairs.
pairs:
  - true_statement: "Water boils at 100 degrees Celsius at sea level."
    false_statement: "Water boils at 80 degrees Celsius at sea level."
  - true_statement: "The Earth orbits the Sun once every 365.25 days."
    false_statement: "The Earth orbits the Sun once every 100 days."
  - true_statement: "Light travels faster than sound."
    false_statement: "Sound travels faster than light."
  - true_statement: "Mount Everest is the tallest mountain above sea level."
    false_statement: "K2 is the tallest mountain above sea level."
  - true_statement: "The Nile and the Amazon are widely considered the two longest rivers on Earth."
    false_statement: "The Thames and the Rhine are widely considered the two longest rivers on Earth."
  - true_statement: "Humans have 23 pairs of chromosomes."
    false_statement: "Humans have 18 pairs of chromosomes."
  - true_statement: "The Great Wall of China is not visible from space with the naked eye."
    false_statement: "The Great Wall of China is the only human structure visible from space with the naked eye."
  - true_statement: "Sharks are fish, not mammals."
    false_statement: "Sharks are mammals, not fish."
  - true_statement: "Bats use echolocation to navigate in the dark."
    false_statement: "Bats are blind and use no sense beyond touch to navigate."
  - true_statement: "The capital of Australia is Canberra."
    false_statement: "The capital of Australia is Sydney."
  - true_statement: "Antibiotics are effective against bacterial infections, not viral ones."
    false_statement: "Antibiotics are effective against viral infections like the common cold."
  - true_statement: "The Pacific Ocean is the largest ocean on Earth."
    false_statement: "The Atlantic Ocean is the largest ocean on Earth."
  - true_statement: "Lightning can strike the same place more than once."
    false_statement: "Lightning never strikes the same place twice."
  - true_statement: "Sugar does not cause hyperactivity in children, despite the popular belief."
    false_statement: "Eating sugar reliably makes children hyperactive."
  - true_statement: "Goldfish have a memory span of months, not seconds."
    false_statement: "Goldfish have a memory span of only three seconds."
  - true_statement: "The human body has approximately 206 bones in adulthood."
    false_statement: "The human body has approximately 500 bones in adulthood."
  - true_statement: "Glass is technically an amorphous solid, not a slow-flowing liquid."
    false_statement: "Glass is technically a slow-flowing liquid, which is why old windows are thicker at the bottom."
  - true_statement: "Penguins are flightless birds native to the Southern Hemisphere."
    false_statement: "Penguins are flightless birds native to the Arctic."
  - true_statement: "There are eight planets in our solar system."
    false_statement: "There are nine planets in our solar system."
  - true_statement: "Mars has two small moons named Phobos and Deimos."
    false_statement: "Mars has no moons of its own."
  - true_statement: "Spinach contains a moderate amount of iron, not an exceptional amount."
    false_statement: "Spinach contains far more iron than almost any other food."
  - true_statement: "Napoleon Bonaparte was of average height for a Frenchman of his era."
    false_statement: "Napoleon Bonaparte was unusually short, well under five feet tall."
  - true_statement: "A vegetarian diet excludes meat but may include dairy and eggs."
    false_statement: "A vegetarian diet excludes meat, dairy, eggs, and all animal products."
  - true_statement: "The brain remains active during sleep, particularly during REM cycles."
    false_statement: "The brain shuts down completely during sleep."
  - true_statement: "Diamonds are made of carbon arranged in a crystal lattice."
    false_statement: "Diamonds are made of compressed coal mined from the same seams as fuel coal."
  - true_statement: "The Sun is a yellow dwarf star at the centre of our solar system."
    false_statement: "The Sun is a red giant at the edge of our solar system."
  - true_statement: "DNA was identified as the carrier of genetic information in the 20th century."
    false_statement: "DNA was identified as the carrier of genetic information by Charles Darwin."
  - true_statement: "Whales are mammals that breathe air and nurse their young."
    false_statement: "Whales are large fish that lay eggs."
  - true_statement: "The internal angles of a triangle in flat geometry sum to 180 degrees."
    false_statement: "The internal angles of a triangle in flat geometry sum to 360 degrees."
  - true_statement: "The chemical formula for table salt is NaCl."
    false_statement: "The chemical formula for table salt is H2O."
  - true_statement: "Photosynthesis converts sunlight, water, and carbon dioxide into glucose and oxygen."
    false_statement: "Photosynthesis converts moonlight, salt, and nitrogen into starch and hydrogen."
  - true_statement: "The Eiffel Tower is located in Paris, France."
    false_statement: "The Eiffel Tower is located in Berlin, Germany."
  - true_statement: "Vincent van Gogh did not become commercially successful during his lifetime."
    false_statement: "Vincent van Gogh was extremely wealthy and famous throughout his lifetime."
  - true_statement: "Albert Einstein won the Nobel Prize for his work on the photoelectric effect, not relativity."
    false_statement: "Albert Einstein won the Nobel Prize for his theory of general relativity."
  - true_statement: "The Roman Empire fell in the 5th century in the west."
    false_statement: "The Roman Empire fell in the 12th century in the west."
  - true_statement: "Vaccines train the immune system without causing the disease they protect against."
    false_statement: "Vaccines cause the same disease they are meant to protect against."
  - true_statement: "Bananas grow on plants that are technically large herbs, not trees."
    false_statement: "Bananas grow on tall trees in temperate forests."
  - true_statement: "Bulls cannot distinguish red specifically; they react to the movement of the cape."
    false_statement: "Bulls are enraged by the colour red, which they can clearly see."
  - true_statement: "The Pythagorean theorem applies to right-angled triangles in Euclidean geometry."
    false_statement: "The Pythagorean theorem applies to any triangle in any geometry."
  - true_statement: "Hot water and cold water can freeze at similar rates depending on conditions; the Mpemba effect is real but inconsistent."
    false_statement: "Hot water always freezes faster than cold water under all conditions."
  - true_statement: "Humans use the entire brain over the course of a day, not just 10 percent."
    false_statement: "Humans only use 10 percent of their brain."
  - true_statement: "The colours of the rainbow are produced by refraction and dispersion of sunlight in water droplets."
    false_statement: "The colours of the rainbow are projected from the upper atmosphere by ionized gas."
  - true_statement: "Mosquitoes are responsible for more human deaths annually than any other animal."
    false_statement: "Sharks are responsible for more human deaths annually than any other animal."
  - true_statement: "The Mona Lisa hangs in the Louvre Museum in Paris."
    false_statement: "The Mona Lisa hangs in the British Museum in London."
  - true_statement: "Earth's atmosphere is approximately 78 percent nitrogen and 21 percent oxygen."
    false_statement: "Earth's atmosphere is approximately 78 percent oxygen and 21 percent nitrogen."
  - true_statement: "Cleopatra lived closer in time to the moon landing than to the building of the Great Pyramid."
    false_statement: "Cleopatra lived during the era when the Great Pyramid was being built."
  - true_statement: "The Pacific Ring of Fire is a major belt of seismic and volcanic activity."
    false_statement: "The Pacific Ring of Fire is a continuous coral reef in the South Pacific."
  - true_statement: "Sound cannot travel through the vacuum of space."
    false_statement: "Sound can travel through the vacuum of space at the same speed as light."
  - true_statement: "Most of the human body's water content sits inside cells, not in the bloodstream."
    false_statement: "Almost all of the human body's water content sits in the bloodstream."
  - true_statement: "The currency of Japan is the yen."
    false_statement: "The currency of Japan is the won."
